<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Extractor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
.header { background: #1a1a2e; padding: 16px 24px; border-bottom: 1px solid #2a2a4a; }
.header h1 { font-size: 18px; color: #7c7cff; }
.header span { color: #888; font-size: 12px; margin-left: 8px; }
.content { flex: 1; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
.input-group { display: flex; gap: 8px; }
.input-group input { flex: 1; padding: 10px 14px; border: 1px solid #2a2a4a; border-radius: 6px; background: #1a1a2e; color: #e0e0e0; font-size: 14px; outline: none; }
.input-group input:focus { border-color: #7c7cff; }
.btn { padding: 10px 20px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: 500; transition: all .2s; }
.btn-primary { background: #7c7cff; color: #fff; }
.btn-primary:hover { background: #6a6ae0; }
.btn-primary:disabled { background: #444; color: #888; cursor: not-allowed; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-copy { background: #2a2a4a; color: #b0b0ff; }
.btn-copy:hover { background: #3a3a5e; }

.config-area { display: flex; flex-direction: column; gap: 6px; }
.config-area label { font-size: 12px; color: #888; }
.config-area textarea { padding: 10px 14px; border: 1px solid #2a2a4a; border-radius: 6px; background: #1a1a2e; color: #e0e0e0; font-size: 13px; font-family: 'Consolas', monospace; resize: vertical; min-height: 80px; outline: none; }
.config-area textarea:focus { border-color: #7c7cff; }

.status-bar { padding: 10px 14px; background: #1a1a2e; border-radius: 6px; border: 1px solid #2a2a4a; font-size: 13px; color: #888; min-height: 40px; }
.status-bar .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #444; border-top-color: #7c7cff; border-radius: 50%; animation: spin .8s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

.results { display: flex; flex-direction: column; gap: 8px; }
.result-card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 6px; padding: 14px; }
.result-card .field { display: flex; gap: 8px; margin-bottom: 6px; font-size: 13px; }
.result-card .field:last-child { margin-bottom: 0; }
.result-card .label { color: #888; min-width: 60px; flex-shrink: 0; }
.result-card .value { color: #e0e0e0; word-break: break-all; font-family: 'Consolas', monospace; font-size: 12px; background: #0f0f1a; padding: 3px 6px; border-radius: 3px; flex: 1; }
.result-card .value.url { color: #7cff7c; }
.result-card .actions { margin-top: 10px; display: flex; gap: 6px; }

.error { color: #ff6b6b; background: #2e1a1a; border-color: #4a2a2a; }
.hidden { display: none; }
</style>
</head>
<body>
<div class="header">
  <h1>Anime Extractor <span>视频直链提取工具</span></h1>
</div>
<div class="content">
  <div class="input-group">
    <input id="urlInput" type="text" placeholder="输入动漫播放页 URL，例如 https://www.jibi.cc/index.php/vod/play/id/2226/sid/1/nid/1.html">
    <button id="extractBtn" class="btn btn-primary">提取</button>
  </div>

  <div class="config-area">
    <label>配置 JSON（可选，留空使用默认规则）</label>
    <textarea id="configInput" placeholder='{"matchVideo":{"matchVideoUrl":"...","cookies":"quality=1080","addHeadersToVideo":{"referer":""}}}'></textarea>
  </div>

  <div id="statusBar" class="status-bar">就绪，输入 URL 后点击"提取"</div>

  <div id="results" class="results"></div>
</div>

<script>
  const urlInput = document.getElementById('urlInput');
  const configInput = document.getElementById('configInput');
  const extractBtn = document.getElementById('extractBtn');
  const statusBar = document.getElementById('statusBar');
  const resultsEl = document.getElementById('results');

  const defaultConfig = {
    matchVideo: {
      enableNestedUrl: true,
      matchNestedUrl: '$^',
      matchVideoUrl: '(^https?:\\/\\/(?:play\\.xluuss\\.com|hn\\.bfvvs\\.com|play\\.subokk\\.com).+\\.(mp4|m3u8|flv|mkv)(\\?.+)?)|(url=(?<v>https?:\\/\\/(?:play\\.xluuss\\.com|hn\\.bfvvs\\.com|play\\.subokk\\.com).+\\.(mp4|m3u8|flv|mkv)(\\?.+)?))',
      cookies: 'quality=1080',
      addHeadersToVideo: { referer: '' }
    }
  };

  configInput.value = JSON.stringify(defaultConfig, null, 2);

  function setStatus(text, loading) {
    statusBar.innerHTML = loading
      ? `<span class="spinner"></span>${text}`
      : text;
  }

  function addResult(data) {
    const card = document.createElement('div');
    card.className = 'result-card';

    if (data.url) {
      card.innerHTML = `
        <div class="field"><span class="label">URL</span><span class="value url">${escapeHtml(data.url)}</span></div>
        <div class="field"><span class="label">Referer</span><span class="value">${escapeHtml(data.referer)}</span></div>
        <div class="field"><span class="label">Cookie</span><span class="value">${escapeHtml(data.cookie)}</span></div>
        <div class="field"><span class="label">耗时</span><span class="value">${data.duration_ms}ms</span></div>
        <div class="actions">
          <button class="btn btn-sm btn-copy" onclick="copyText('${escapeHtml(data.url)}')">复制 URL</button>
          <button class="btn btn-sm btn-copy" onclick="copyText('${escapeHtml(JSON.stringify(data, null, 2))}')">复制全部</button>
        </div>`;
    } else {
      card.classList.add('error');
      card.innerHTML = `<div class="field"><span class="label">错误</span><span class="value">${escapeHtml(data.error)}</span></div>`;
    }
    resultsEl.prepend(card);
  }

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function copyText(text) {
    navigator.clipboard.writeText(text).then(() => {
      setStatus('已复制到剪贴板');
    });
  }

  extractBtn.addEventListener('click', () => {
    const url = urlInput.value.trim();
    if (!url) { setStatus('请输入 URL'); return; }

    let config;
    try {
      config = JSON.parse(configInput.value.trim() || '{}');
    } catch (e) {
      setStatus('配置 JSON 格式错误: ' + e.message);
      return;
    }
    config.url = url;

    extractBtn.disabled = true;
    setStatus('提取中...', true);

    window.__extractor.startExtraction(config);
  });

  window.__extractor.onStatus((data) => {
    setStatus(data.message, data.loading);
  });

  window.__extractor.onResult((data) => {
    addResult(data);
    extractBtn.disabled = false;
    setStatus('提取完成，耗时 ' + data.duration_ms + 'ms');
  });

  window.__extractor.onError((data) => {
    addResult({ error: data.error });
    extractBtn.disabled = false;
    setStatus('提取失败');
  });
</script>
</body>
</html>
