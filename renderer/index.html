<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Extractor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
.header { background: #1a1a2e; padding: 16px 24px; border-bottom: 1px solid #2a2a4a; }
.header h1 { font-size: 18px; color: #7c7cff; }
.header span { color: #888; font-size: 12px; margin-left: 8px; }
.content { flex: 1; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
.step { display: none; flex-direction: column; gap: 12px; }
.step.active { display: flex; }
.step-header { font-size: 14px; color: #7c7cff; font-weight: 600; margin-bottom: 4px; }
.source-select { padding: 10px 14px; border: 1px solid #2a2a4a; border-radius: 6px; background: #1a1a2e; color: #e0e0e0; font-size: 14px; outline: none; width: 100%; }
.source-select:focus { border-color: #7c7cff; }
.source-desc { font-size: 12px; color: #888; padding: 4px 0; }
.search-row { display: flex; gap: 8px; }
.search-row input { flex: 1; padding: 10px 14px; border: 1px solid #2a2a4a; border-radius: 6px; background: #1a1a2e; color: #e0e0e0; font-size: 14px; outline: none; }
.search-row input:focus { border-color: #7c7cff; }
.result-list { max-height: 200px; overflow-y: auto; border: 1px solid #2a2a4a; border-radius: 6px; }
.result-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-bottom: 1px solid #2a2a4a; cursor: pointer; transition: background .15s; }
.result-item:last-child { border-bottom: none; }
.result-item:hover { background: #1a1a2e; }
.result-item .name { font-size: 13px; flex: 1; }
.channel-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.channel-tab { padding: 6px 14px; border: 1px solid #2a2a4a; border-radius: 6px; background: #1a1a2e; color: #888; font-size: 13px; cursor: pointer; transition: all .15s; }
.channel-tab.active { background: #7c7cff; color: #fff; border-color: #7c7cff; }
.channel-tab:hover { border-color: #7c7cff; }
.episode-grid { display: flex; flex-wrap: wrap; gap: 6px; max-height: 240px; overflow-y: auto; padding: 4px 0; }
.ep-item { padding: 6px 12px; border: 1px solid #2a2a4a; border-radius: 4px; font-size: 12px; cursor: pointer; transition: all .15s; color: #b0b0ff; }
.ep-item:hover { border-color: #7c7cff; }
.ep-item.active { background: #7c7cff; color: #fff; border-color: #7c7cff; }
.btn { padding: 10px 20px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: 500; transition: all .2s; }
.btn-primary { background: #7c7cff; color: #fff; }
.btn-primary:hover { background: #6a6ae0; }
.btn-primary:disabled { background: #444; color: #888; cursor: not-allowed; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-copy { background: #2a2a4a; color: #b0b0ff; }
.btn-copy:hover { background: #3a3a5e; }
.btn-back { background: #2a2a4a; color: #b0b0ff; }
.btn-back:hover { background: #3a3a5e; }
.nav-row { display: flex; justify-content: space-between; margin-top: 8px; }
.status-bar { padding: 10px 14px; background: #1a1a2e; border-radius: 6px; border: 1px solid #2a2a4a; font-size: 13px; color: #888; min-height: 40px; }
.status-bar .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #444; border-top-color: #7c7cff; border-radius: 50%; animation: spin .8s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
.results { display: flex; flex-direction: column; gap: 8px; }
.result-card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 6px; padding: 14px; }
.result-card .field { display: flex; gap: 8px; margin-bottom: 6px; font-size: 13px; }
.result-card .field:last-child { margin-bottom: 0; }
.result-card .label { color: #888; min-width: 60px; flex-shrink: 0; }
.result-card .value { color: #e0e0e0; word-break: break-all; font-family: 'Consolas', monospace; font-size: 12px; background: #0f0f1a; padding: 3px 6px; border-radius: 3px; flex: 1; }
.result-card .value.url { color: #7cff7c; }
.result-card .actions { margin-top: 10px; display: flex; gap: 6px; }
.error { color: #ff6b6b; background: #2e1a1a; border-color: #4a2a2a; }
.hidden { display: none; }
</style>
</head>
<body>

<div class="header">
  <h1>Anime Extractor <span>视频聚合源提取工具</span></h1>
</div>

<div class="content">
  <!-- Step 1: 源选择 -->
  <div id="step1" class="step active">
    <div class="step-header">① 选择资源站</div>
    <select id="sourceSelect" class="source-select">
      <option value="">加载中...</option>
    </select>
    <div id="sourceDesc" class="source-desc"></div>
    <div class="nav-row">
      <span></span>
      <button id="toStep2Btn" class="btn btn-primary" disabled>下一步 →</button>
    </div>
  </div>

  <!-- Step 2: 搜索 -->
  <div id="step2" class="step">
    <div class="step-header">② 搜索番剧</div>
    <div class="search-row">
      <input id="keywordInput" type="text" placeholder="输入关键词，例如 火影忍者">
      <button id="searchBtn" class="btn btn-primary">搜索</button>
    </div>
    <div id="searchResults" class="result-list"></div>
    <div class="nav-row">
      <button id="backTo1Btn" class="btn btn-back">← 上一步</button>
      <span></span>
    </div>
  </div>

  <!-- Step 3: 选集 -->
  <div id="step3" class="step">
    <div class="step-header">③ 选择线路和集数</div>
    <div id="channelTabs" class="channel-tabs"></div>
    <div id="episodeGrid" class="episode-grid"></div>
    <div id="selectedEp" style="font-size:12px;color:#888;min-height:18px;"></div>
    <div class="nav-row">
      <button id="backTo2Btn" class="btn btn-back">← 上一步</button>
      <button id="extractBtn" class="btn btn-primary" disabled>提取 ↗</button>
    </div>
  </div>

  <!-- Status bar -->
  <div id="statusBar" class="status-bar">就绪</div>

  <!-- Extraction results -->
  <div id="results" class="results"></div>
</div>

<script>
let sources = [];
let selectedSource = null;
let searchResults = [];
let channels = [];
let selectedChannelIdx = 0;
let selectedEpisode = null;

const step1 = document.getElementById('step1');
const step2 = document.getElementById('step2');
const step3 = document.getElementById('step3');
const sourceSelect = document.getElementById('sourceSelect');
const sourceDesc = document.getElementById('sourceDesc');
const toStep2Btn = document.getElementById('toStep2Btn');
const keywordInput = document.getElementById('keywordInput');
const searchBtn = document.getElementById('searchBtn');
const searchResultsEl = document.getElementById('searchResults');
const backTo1Btn = document.getElementById('backTo1Btn');
const channelTabs = document.getElementById('channelTabs');
const episodeGrid = document.getElementById('episodeGrid');
const selectedEp = document.getElementById('selectedEp');
const backTo2Btn = document.getElementById('backTo2Btn');
const extractBtn = document.getElementById('extractBtn');
const statusBar = document.getElementById('statusBar');
const resultsEl = document.getElementById('results');

function setStatus(text, loading) {
  statusBar.textContent = '';
  if (loading) {
    const s = document.createElement('span');
    s.className = 'spinner';
    statusBar.appendChild(s);
  }
  statusBar.appendChild(document.createTextNode(text));
}

function showStep(n) {
  [step1, step2, step3].forEach((el, i) => {
    el.classList.toggle('active', i === n - 1);
  });
}

function addField(card, label, value, cls) {
  const field = document.createElement('div');
  field.className = 'field';
  const lbl = document.createElement('span');
  lbl.className = 'label';
  lbl.textContent = label;
  field.appendChild(lbl);
  const val = document.createElement('span');
  val.className = 'value' + (cls ? ' ' + cls : '');
  val.textContent = value;
  field.appendChild(val);
  card.appendChild(field);
}

function addResult(data) {
  const card = document.createElement('div');
  card.className = 'result-card';
  if (data.url) {
    addField(card, 'URL', data.url, 'url');
    addField(card, 'Referer', data.referer);
    addField(card, 'Cookie', data.cookie);
    addField(card, '耗时', data.duration_ms + 'ms');
    const actions = document.createElement('div');
    actions.className = 'actions';
    const btnUrl = document.createElement('button');
    btnUrl.className = 'btn btn-sm btn-copy';
    btnUrl.textContent = '复制 URL';
    btnUrl.addEventListener('click', () => navigator.clipboard.writeText(data.url).then(() => setStatus('已复制')));
    actions.appendChild(btnUrl);
    const btnAll = document.createElement('button');
    btnAll.className = 'btn btn-sm btn-copy';
    btnAll.textContent = '复制全部';
    btnAll.addEventListener('click', () => navigator.clipboard.writeText(JSON.stringify(data, null, 2)).then(() => setStatus('已复制')));
    actions.appendChild(btnAll);
    card.appendChild(actions);
  } else {
    card.classList.add('error');
    addField(card, '错误', data.error || 'unknown');
  }
  resultsEl.prepend(card);
}

// Step 1: 源选择
window.__extractor.onSourcesList((data) => {
  sources = data;
  sourceSelect.innerHTML = '';
  if (sources.length === 0) {
    sourceSelect.innerHTML = '<option value="">无可用源</option>';
    return;
  }
  sources.forEach((s, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = s.name;
    sourceSelect.appendChild(opt);
  });
  sourceSelect.dispatchEvent(new Event('change'));
});

sourceSelect.addEventListener('change', () => {
  const idx = parseInt(sourceSelect.value);
  selectedSource = isNaN(idx) ? null : sources[idx];
  sourceDesc.textContent = selectedSource ? (selectedSource.description || '暂无描述') : '';
  toStep2Btn.disabled = !selectedSource;
});

toStep2Btn.addEventListener('click', () => {
  if (!selectedSource) return;
  showStep(2);
  keywordInput.focus();
});

// Step 2: 搜索
backTo1Btn.addEventListener('click', () => showStep(1));

searchBtn.addEventListener('click', () => {
  const kw = keywordInput.value.trim();
  if (!kw) { setStatus('请输入关键词'); return; }
  searchBtn.disabled = true;
  setStatus('搜索中...', true);
  window.__extractor.searchAnime(selectedSource.name, kw);
});

keywordInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') searchBtn.click();
});

window.__extractor.onSearchResults((data) => {
  searchBtn.disabled = false;
  searchResults = data;
  searchResultsEl.innerHTML = '';
  if (data.length === 0) {
    setStatus('未找到相关结果');
    return;
  }
  setStatus('找到 ' + data.length + ' 个结果');
  data.forEach((r, i) => {
    const item = document.createElement('div');
    item.className = 'result-item';
    const name = document.createElement('span');
    name.className = 'name';
    name.textContent = r.name;
    item.appendChild(name);
    const btn = document.createElement('button');
    btn.className = 'btn btn-sm btn-primary';
    btn.textContent = '选择';
    btn.addEventListener('click', () => selectSubject(i));
    item.appendChild(btn);
    searchResultsEl.appendChild(item);
  });
});

function selectSubject(idx) {
  const subject = searchResults[idx];
  if (!subject) return;
  setStatus('解析剧集...', true);
  window.__extractor.parseEpisodes(selectedSource.name, subject.url);
}

// Step 3: 选集
backTo2Btn.addEventListener('click', () => showStep(2));

window.__extractor.onEpisodesData((data) => {
  channels = data.channels || [];
  selectedChannelIdx = 0;
  selectedEpisode = null;
  extractBtn.disabled = true;
  selectedEp.textContent = '';

  if (channels.length === 0) {
    setStatus('未解析到剧集');
    showStep(2);
    return;
  }

  showStep(3);
  setStatus('共 ' + channels.length + ' 条线路');
  renderChannels();
});

function renderChannels() {
  channelTabs.innerHTML = '';
  channels.forEach((ch, i) => {
    const tab = document.createElement('button');
    tab.className = 'channel-tab' + (i === selectedChannelIdx ? ' active' : '');
    tab.textContent = ch.name + ' (' + ch.episodes.length + ')';
    tab.addEventListener('click', () => {
      selectedChannelIdx = i;
      selectedEpisode = null;
      extractBtn.disabled = true;
      selectedEp.textContent = '';
      renderChannels();
      renderEpisodes();
    });
    channelTabs.appendChild(tab);
  });
  renderEpisodes();
}

function renderEpisodes() {
  episodeGrid.innerHTML = '';
  const ch = channels[selectedChannelIdx];
  if (!ch) return;
  const sorted = [...ch.episodes].sort((a, b) => a.sort - b.sort);
  sorted.forEach((ep) => {
    const item = document.createElement('div');
    item.className = 'ep-item' + (selectedEpisode && selectedEpisode.url === ep.url ? ' active' : '');
    item.textContent = ep.name;
    item.addEventListener('click', () => {
      selectedEpisode = ep;
      selectedEp.textContent = '选中: ' + ep.name;
      extractBtn.disabled = false;
      renderEpisodes();
    });
    episodeGrid.appendChild(item);
  });
}

// 提取
extractBtn.addEventListener('click', () => {
  if (!selectedEpisode || !selectedSource) return;
  extractBtn.disabled = true;
  setStatus('提取中...', true);

  const mv = selectedSource.searchConfig.matchVideo || {};
  const config = {
    url: selectedEpisode.url,
    matchVideo: {
      enableNestedUrl: true,
      matchNestedUrl: mv.matchNestedUrl || '$^',
      matchVideoUrl: mv.matchVideoUrl || '',
      cookies: mv.cookies || '',
      addHeadersToVideo: mv.addHeadersToVideo || { referer: '' }
    }
  };
  window.__extractor.startExtraction(config);
});

// 结果回调
window.__extractor.onResult((data) => {
  addResult(data);
  extractBtn.disabled = false;
  setStatus('提取完成，耗时 ' + data.duration_ms + 'ms');
});

window.__extractor.onError((data) => {
  addResult({ error: data.error });
  extractBtn.disabled = false;
  setStatus('提取失败: ' + data.error);
});

// 启动
window.__extractor.fetchSources();
</script>
</body>
</html>
